<svg width="680" height="460" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Architecture diagram: two independent paths into the tree census API</title>
<desc>Two separate entry points both lead to the same REST API. An AI agent calls an MCP server, which calls the REST API. Separately, any other API client such as a browser or curl can call the REST API directly, bypassing MCP entirely. Both paths converge on the same authenticated REST API, which reads from a local CSV snapshot loaded into memory at startup, with no live network call to NYC Open Data on any request.</desc>
<defs>
<marker id="arrow-p" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
<marker id="arrow-g" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker>
</defs>

<rect width="680" height="460" fill="#FFFFFF"/>

<line x1="145" y1="86" x2="145" y2="140" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-p)"/>
<path d="M145 196 L145 225 L290 225 L290 250" fill="none" stroke="#534AB7" stroke-width="1.5" marker-end="url(#arrow-p)"/>
<path d="M535 86 L535 140 L390 140 L390 250" fill="none" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow-g)"/>
<line x1="340" y1="306" x2="340" y2="360" stroke="#5F5E5A" stroke-width="1.5" marker-end="url(#arrow-g)"/>

<text x="218" y="218" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5E5A">via MCP tools</text>
<text x="463" y="133" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5E5A">direct HTTP call</text>

<rect x="50" y="30" width="190" height="56" rx="8" fill="#EDEBFB" stroke="#534AB7" stroke-width="0.5"/>
<text x="145" y="48" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2A2660">AI agent</text>
<text x="145" y="66" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#534AB7">e.g. Claude Desktop</text>

<rect x="440" y="30" width="190" height="56" rx="8" fill="#EFEFED" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="535" y="48" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2E2D2B">Browser, curl, app</text>
<text x="535" y="66" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5E5A">calls the API directly</text>

<rect x="50" y="140" width="190" height="56" rx="8" fill="#E1F5F2" stroke="#1E8A7C" stroke-width="0.5"/>
<text x="145" y="158" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#0F4A42">MCP server</text>
<text x="145" y="176" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1E8A7C">3 tools, read-only</text>

<rect x="245" y="250" width="190" height="56" rx="8" fill="#E3EEFC" stroke="#2563C7" stroke-width="0.5"/>
<text x="340" y="268" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#123A73">REST API</text>
<text x="340" y="286" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#2563C7">FastAPI, auth required</text>

<rect x="245" y="360" width="190" height="56" rx="8" fill="#EFEFED" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="378" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2E2D2B">Local CSV snapshot</text>
<text x="340" y="396" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#5F5E5A">no live NYC fetch needed</text>
</svg>
